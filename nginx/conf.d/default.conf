# nginx/conf.d/default.conf
# worklex_proxy - Reverse proxy para el stack WorkLex

upstream worklex_backend_upstream {
    server worklex_backend:8000;
}

upstream worklex_frontend_upstream {
    server worklex_frontend:5173;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    # API -> Django backend
    location /api/ {
        proxy_pass http://worklex_backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin / static
    location /admin/ {
        proxy_pass http://worklex_backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media servida por MinIO (worklex_media)
    location /media/ {
        proxy_pass http://worklex_media:9000/;
        proxy_set_header Host $host;
    }

    # Frontend (React + Vite)
    location / {
        proxy_pass http://worklex_frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Soporte para HMR de Vite (WebSocket)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
