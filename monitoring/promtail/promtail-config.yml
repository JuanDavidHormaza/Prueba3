# monitoring/promtail/promtail-config.yml
# Fluentd/Promtail - envia logs de contenedores a Loki (worklex_logs)

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://worklex_logs:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: worklex_containers
          __path__: /var/log/worklex/*.log
