# monitoring/grafana/datasources/datasources.yml
# Datasources auto-aprovisionados para Grafana (worklex_monitor)

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://worklex_logs:3100
