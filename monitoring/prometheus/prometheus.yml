# monitoring/prometheus/prometheus.yml
# worklex_monitor - configuracion de scrape de Prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "worklex_backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["worklex_backend:8000"]

  - job_name: "worklex_postgres"
    static_configs:
      - targets: ["worklex_persistencia:5432"]

  - job_name: "worklex_redis"
    static_configs:
      - targets: ["worklex_cache:6379"]
