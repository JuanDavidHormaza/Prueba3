services:
  proxy:
    image: nginx:latest
    container_name: worklex_proxy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro

    networks:
      - worklex_network

networks:
  worklex_network:
    external: true